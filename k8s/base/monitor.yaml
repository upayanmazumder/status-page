apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor-service
  namespace: status-page
  labels:
    app: monitor-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: monitor-service
  template:
    metadata:
      labels:
        app: monitor-service
    spec:
      containers:
        - name: monitor
          image: ghcr.io/YOUR_USERNAME/status-page/monitor:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: status-page-config
            - secretRef:
                name: status-page-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: monitor-service
  namespace: status-page
spec:
  type: ClusterIP
  selector:
    app: monitor-service
  ports:
    - port: 8000
      targetPort: 8000
      name: http
