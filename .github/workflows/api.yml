name: Build & Push API Services

on:
  push:
    branches:
      - main
      - develop
    paths:
      - "api/**"
      - ".github/workflows/api.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      auth: ${{ steps.changes.outputs.auth }}
      monitor: ${{ steps.changes.outputs.monitor }}
      notify: ${{ steps.changes.outputs.notify }}
      dashboard: ${{ steps.changes.outputs.dashboard }}
      status: ${{ steps.changes.outputs.status }}
      gateway: ${{ steps.changes.outputs.gateway }}
      shared: ${{ steps.changes.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            auth:
              - 'api/auth/**'
              - 'api/shared/**'
            monitor:
              - 'api/monitor/**'
              - 'api/shared/**'
            notify:
              - 'api/notify/**'
              - 'api/shared/**'
            dashboard:
              - 'api/dashboard/**'
              - 'api/shared/**'
            status:
              - 'api/status/**'
              - 'api/shared/**'
            gateway:
              - 'api/gateway/**'
              - 'api/shared/**'
            shared:
              - 'api/shared/**'

  build-auth:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.auth == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/auth
          tags: |
            type=sha,format=short
            type=ref,event=branch
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/auth/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-monitor:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.monitor == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/monitor
          tags: |
            type=sha,format=short
            type=ref,event=branch
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/monitor/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-notify:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.notify == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/notify
          tags: |
            type=sha,format=short
            type=ref,event=branch
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/notify/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-dashboard:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.dashboard == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/dashboard
          tags: |
            type=sha,format=short
            type=ref,event=branch
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/dashboard/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-status:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.status == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/status
          tags: |
            type=sha,format=short
            type=ref,event=branch
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/status/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-gateway:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.gateway == 'true' || needs.detect-changes.outputs.shared == 'true' || github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}/gateway
          tags: |
            type=sha,format=short
            type=ref,event=branch
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./api/gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
